name: drev-ci-pipeline

source:
  type: git
  url: https://github.com/golang/example.git
  ref: master

triggers:
  - push
  - pull_request

env:
  GO_ENV: production
  APP_NAME: drev

jobs:
  - name: test
    image: golang:1.23-alpine
    steps:
      - name: install deps
        run: go mod download 

      - name: run tests
        run: go test ./...

  - name: build
    image: golang:1.23-alpine
    depends_on:
      - test
    steps:
      - name: build binary
        run: go build -o /tmp/app ./gotypes/hello

      - name: confirm binary exists
        run: ls -lh /tmp/app
